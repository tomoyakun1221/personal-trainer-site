# Fly.io デプロイ設定
# 使い方: fly launch --no-deploy 後、fly secrets set ... && fly deploy

app = "tsp-personal-trainer"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  RAILS_ENV = "production"
  RUN_DB_SEED = "true"
  FORCE_SSL = "true"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "15s"
    method = "GET"
    path = "/up"
    timeout = "5s"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "tsp_storage"
  destination = "/app/storage"
